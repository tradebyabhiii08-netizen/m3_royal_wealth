<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — M3 Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/design-tokens.css">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('m3-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') {
            document.addEventListener('DOMContentLoaded', function () { document.body.classList.add('dark-mode'); });
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--navy:#0f0c29;--navy-m:#1a1550;--gold:#e8c84a;--gold-d:#d4a843;--gold-l:#f5d96b;--gold-xl:#fdf3cc;--cream:#fdf9ee;--muted:#6b6080;--ink:#1a0f3c;}
    body{font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(145deg,#f5edcc 0%,#fdf9ee 40%,#fffdf5 70%,#f5edcc 100%);color:#141124;}
    html[data-theme="dark"] body,
    body.dark-mode {
        background: linear-gradient(145deg, #07060f 0%, #0f0c29 45%, #1a1550 80%, #07060f 100%) !important;
        color: #f4eed2;
    }
    h1,h2{font-family:'Cormorant Garamond',serif;}

    .auth-wrap{width:100%;max-width:420px;}

    .brand-header{text-align:center;margin-bottom:24px;}
    .brand-header .logo{font-size:2.2em;margin-bottom:8px;}
    .brand-header h1{font-size:1.6em;color:white;font-weight:700;margin-bottom:4px;}
    .brand-header p{color:rgba(255,255,255,0.5);font-size:0.85em;}

    .auth-card{background:var(--cream);border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(15,12,41,0.45);border-top:4px solid var(--gold);}

    .card-title{font-size:1.5em;color:var(--navy);font-weight:700;text-align:center;margin-bottom:4px;}
    .card-sub{text-align:center;color:var(--muted);font-size:0.85em;margin-bottom:24px;}

    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:0.82em;font-weight:700;color:var(--navy);margin-bottom:6px;letter-spacing:0.02em;}
    .form-group input{width:100%;padding:11px 14px;border:1.5px solid rgba(212,168,67,0.35);border-radius:10px;font-size:0.95em;font-family:'DM Sans',sans-serif;background:white;color:var(--ink);transition:all 0.2s;}
    .form-group input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,200,74,0.2);}
    .form-group input::placeholder{color:#b8aec8;}

    .forgot-link{display:block;text-align:right;font-size:0.8em;color:var(--navy);font-weight:600;text-decoration:none;margin-top:5px;}
    .forgot-link:hover{color:var(--gold-d);}

    .error-box{background:#fee2e2;color:#991b1b;padding:11px 14px;border-radius:9px;margin-bottom:18px;border-left:3px solid #dc2626;font-size:0.88em;font-weight:500;}

    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--navy);font-weight:700;font-size:1em;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;box-shadow:0 4px 14px rgba(232,200,74,0.35);margin-top:4px;}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(232,200,74,0.5);}

    .divider{text-align:center;color:var(--muted);font-size:0.8em;margin:18px 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:rgba(232,200,74,0.2);}
    .divider::before{left:0;} .divider::after{right:0;}

    .auth-links{text-align:center;font-size:0.85em;color:var(--muted);}
    .auth-links a{color:var(--navy);font-weight:700;text-decoration:none;}
    .auth-links a:hover{color:var(--gold-d);}
    .auth-links p+p{margin-top:8px;}
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="brand-header">
        <div class="logo">📊</div>
        <h1>M3 Portfolio</h1>
        <p>Investment Analysis Platform</p>
    </div>
    <div class="auth-card">
        <h2 class="card-title">Welcome Back</h2>
        <p class="card-sub">Sign in to your advisor account</p>
        {% if error %}<div class="error-box">⚠️ {{ error }}</div>{% endif %}
        <form action="/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="your@email.com" autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
                <a href="/forgot" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn-submit">🚀 Sign In</button>
        </form>
        <div class="divider">or</div>
        <div class="auth-links">
            <p>Don't have an account? <a href="/register">Create one</a></p>
            <p><a href="/">← Back to Home</a></p>
        </div>
    </div>
</div>
</body>
</html>
